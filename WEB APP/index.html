<!DOCTYPE html>
<html>
<head>
  <title>World State Viewer</title>
</head>
<body>
  <h1>World State API Viewer</h1>

  <button onclick="loadWorldState()">Load World State</button>

  <pre id="output"></pre>

  <script>
  async function loadWorldState() {
    const res = await fetch("https://3000-yourname-12se_major_project-xxxxx.githubpreview.dev/worldstate");
    const data = await res.json();
    document.getElementById("output").textContent = JSON.stringify(data, null, 2);
  }
  </script>
</body>
</html>
