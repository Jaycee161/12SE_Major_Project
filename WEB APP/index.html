<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Warframe</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f6f9;
    }
    .topbar {
      background: #3c8dbc;
      color: #fff;
      padding: 10px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .topbar .title {
      font-size: 20px;
      font-weight: bold;
    }
    .layout {
      display: flex;
      min-height: calc(100vh - 50px);
    }
    .sidebar {
      width: 220px;
      background: #222d32;
      color: #b8c7ce;
      padding-top: 10px;
    }
    .sidebar h3 {
      color: #fff;
      padding: 10px 15px;
      margin: 0;
      font-size: 16px;
      border-bottom: 1px solid #1a2226;
    }
    .sidebar ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    .sidebar li {
      padding: 10px 15px;
      cursor: pointer;
    }
    .sidebar li:hover {
      background: #1e282c;
      color: #fff;
    }
    .content {
      flex: 1;
      padding: 20px;
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 15px;
      margin-bottom: 20px;
    }
    .stat-box {
      color: #fff;
      padding: 15px;
      border-radius: 4px;
    }
    .stat-users { background: #00a65a; }
    .stat-categories { background: #dd4b39; }
    .stat-products { background: #00c0ef; }
    .stat-sales { background: #f39c12; }
    .stat-title {
      font-size: 14px;
      opacity: 0.9;
    }
    .stat-value {
      font-size: 24px;
      font-weight: bold;
      margin-top: 5px;
    }
    .cards {
      display: grid;
      grid-template-columns: 2fr 2fr 1.5fr;
      gap: 20px;
    }
    .card {
      background: #fff;
      border-radius: 4px;
      box-shadow: 0 1px 2px rgba(0,0,0,0.1);
      padding: 15px;
    }
    .card h2 {
      margin: 0 0 10px;
      font-size: 16px;
      border-bottom: 1px solid #eee;
      padding-bottom: 8px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    th, td {
      padding: 6px 8px;
      border-bottom: 1px solid #eee;
      text-align: left;
    }
    th {
      background: #f9fafc;
      font-weight: bold;
    }
    .product-list {
      list-style: none;
      padding: 0;
      margin: 0;
      font-size: 13px;
    }
    .product-list li {
      padding: 6px 0;
      border-bottom: 1px solid #eee;
    }
    .product-name {
      font-weight: bold;
    }
    .product-meta {
      color: #777;
      font-size: 12px;
    }
  </style>
</head>
<body>
</body>
</html>
